networks:
  ? moirai_network
services:
  postgresql:
    restart: always
    container_name: postgresql
    hostname: postgresql
    image: postgres:18-alpine
    networks:
      - moirai_network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: moirai
      POSTGRES_PASSWORD: moirai
      POSTGRES_DB: moirai
    volumes:
      - postgresql_data:/var/lib/postgresql
  qdrant:
    restart: always
    container_name: qdrant
    hostname: qdrant
    image: qdrant/qdrant:v1.17.1
    networks:
      - moirai_network
    ports:
      - "6333:6333"
      - "6334:6334"
  minio:
    restart: always
    container_name: minio
    hostname: minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    networks:
      - moirai_network
    environment:
      MINIO_ROOT_USER: moirairpg
      MINIO_ROOT_PASSWORD: moirairpg
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  minio-init:
    container_name: minio-init
    hostname: minio-init
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - moirai_network
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set minio http://minio:9000 moirairpg moirairpg;
      mc mb --ignore-existing minio/moirai;
      mc anonymous set public minio/moirai;
      exit 0;
      "

volumes:
  minio_data:
  postgresql_data: