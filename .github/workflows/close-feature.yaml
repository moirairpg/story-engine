name: Close feature

on:
  workflow_dispatch:

jobs:
  close-feature:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate branch
        run: |
          if [[ "${{ github.ref_name }}" != feature/* ]]; then
            echo "::error::This workflow must be run on a feature/* branch."
            exit 1
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout feature branch
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Configure git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          APP_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Merge develop into feature branch
        run: |
          git fetch origin develop
          if ! git merge origin/develop --no-ff -m "close feature: merge develop into ${{ github.ref_name }}"; then
            echo "::error::Merge conflicts detected. Resolve conflicts manually before closing this feature."
            git merge --abort
            exit 1
          fi

      - name: Merge feature branch into develop
        run: |
          git checkout develop
          git pull origin develop
          git merge ${{ github.ref_name }} --no-ff -m "close feature: merge ${{ github.ref_name }} into develop"

      - name: Normalize version on develop
        run: |
          FEATURE_NAME="${GITHUB_REF_NAME#feature/}"
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          NUMERIC_VERSION=${CURRENT_VERSION%-SNAPSHOT}
          NUMERIC_VERSION=${NUMERIC_VERSION%-$FEATURE_NAME}
          SNAPSHOT_VERSION="${NUMERIC_VERSION}-SNAPSHOT"
          mvn versions:set -DnewVersion=$SNAPSHOT_VERSION -DgenerateBackupPoms=false
          git add pom.xml
          if ! git diff --cached --quiet; then
            git commit -m "close feature: normalize version to $SNAPSHOT_VERSION"
          fi
          git push origin develop

      - name: Delete feature branch
        run: |
          git push origin --delete ${{ github.ref_name }}
