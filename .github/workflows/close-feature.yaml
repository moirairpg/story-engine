name: Close feature

on:
  workflow_dispatch:
    inputs:
      feature_name:
        description: "Feature name (e.g. my-feature)"
        required: true
        type: string

jobs:
  close-feature:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v6.0.2
        with:
          ref: feature/${{ inputs.feature_name }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge develop into feature branch
        run: |
          git fetch origin develop
          if ! git merge origin/develop --no-ff -m "feature: merge develop into feature/${{ inputs.feature_name }}"; then
            echo "::error::Merge conflicts detected. Resolve conflicts manually before closing this feature."
            git merge --abort
            exit 1
          fi

      - name: Normalize version
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          NUMERIC_VERSION=${CURRENT_VERSION%-SNAPSHOT}
          NUMERIC_VERSION=${NUMERIC_VERSION%-${{ inputs.feature_name }}}
          SNAPSHOT_VERSION="${NUMERIC_VERSION}-SNAPSHOT"
          mvn versions:set -DnewVersion=$SNAPSHOT_VERSION -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "feature: normalize version to $SNAPSHOT_VERSION"
          git push origin feature/${{ inputs.feature_name }}

      - name: Merge feature branch into develop
        run: |
          git checkout develop
          git pull origin develop
          git merge feature/${{ inputs.feature_name }} --no-ff -m "feature: merge feature/${{ inputs.feature_name }} into develop"
          git push origin develop

      - name: Delete feature branch
        run: |
          git push origin --delete feature/${{ inputs.feature_name }}
