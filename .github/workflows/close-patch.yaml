name: Close patch

on:
  workflow_dispatch:

jobs:
  close-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout develop
        uses: actions/checkout@v6.0.2
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Configure git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          APP_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Capture develop version
        run: |
          DEVELOP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "DEVELOP_VERSION=$DEVELOP_VERSION" >> $GITHUB_ENV

      - name: Resolve patch branch name
        run: |
          PATCH_BRANCH=$(git ls-remote --heads origin 'patch/*' | sed 's|.*refs/heads/||')
          if [ -z "$PATCH_BRANCH" ]; then
            echo "::error::No patch branch found."
            exit 1
          fi
          echo "PATCH_BRANCH=$PATCH_BRANCH" >> $GITHUB_ENV
          PATCH_VERSION=${PATCH_BRANCH#patch/}
          echo "PATCH_VERSION=$PATCH_VERSION" >> $GITHUB_ENV

      - name: Checkout patch branch
        run: |
          git fetch origin
          git checkout ${{ env.PATCH_BRANCH }}

      - name: Merge main into patch branch
        run: |
          git fetch origin main
          if ! git merge origin/main --no-ff -m "close patch: merge main into ${{ env.PATCH_BRANCH }}"; then
            echo "::error::Merge conflicts detected. Resolve conflicts manually before closing this patch."
            git merge --abort
            exit 1
          fi

      - name: Merge patch branch into main
        run: |
          git checkout main
          git pull origin main
          git merge ${{ env.PATCH_BRANCH }} --no-ff -m "close patch: merge ${{ env.PATCH_BRANCH }} into main"

      - name: Normalize main version
        run: |
          mvn versions:set -DnewVersion=${{ env.PATCH_VERSION }} -DgenerateBackupPoms=false
          git add pom.xml
          if ! git diff --cached --quiet; then
            git commit -m "close patch: set version ${{ env.PATCH_VERSION }}"
          fi
          git push origin main

      - name: Merge main into develop
        run: |
          git checkout develop
          git pull origin develop
          if ! git merge origin/main --no-ff -m "close patch: merge main into develop after ${{ env.PATCH_BRANCH }}"; then
            echo "::error::Merge conflicts detected. Resolve conflicts manually before closing this patch."
            git merge --abort
            exit 1
          fi

      - name: Restore develop version
        run: |
          mvn versions:set -DnewVersion=${{ env.DEVELOP_VERSION }} -DgenerateBackupPoms=false
          git add pom.xml
          if ! git diff --cached --quiet; then
            git commit -m "close patch: restore develop version to ${{ env.DEVELOP_VERSION }}"
          fi
          git push origin develop

      - name: Delete patch branch
        run: |
          git push origin --delete ${{ env.PATCH_BRANCH }}
