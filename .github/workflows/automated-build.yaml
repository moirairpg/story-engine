name: Run build
on:
  push:
    branches:
      - '**'
  workflow_dispatch:
jobs:
  MoirAI:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout branch
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"
      - name: Build
        run: |
            git pull
            mvn package -DskipTests -e
            echo "CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_ENV
            echo "APP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
      - name: Unit tests
        if: github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/master'
        run: mvn test -e -DskipIntegrationTests
      - name: Integration tests
        if: github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/master'
        run: mvn test -e -DskipUnitTests
      - name: Test container build image
        if: github.ref != 'refs/heads/develop'
        run: docker build --build-arg APP_VERSION=${{ env.APP_VERSION }} -t ${{ vars.DOCKER_REPO_ADDR }}/${{ vars.DOCKER_REPO }}/${{ vars.DOCKER_IMAGE_NAME }}:bleeding-edge .
      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/develop'
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ vars.DOCKER_REPO_ADDR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image to GitHub Container Registry
        if: github.ref == 'refs/heads/develop'
        run: |
          docker build --build-arg APP_VERSION=${{ env.APP_VERSION }} -t ${{ vars.DOCKER_REPO_ADDR }}/${{ vars.DOCKER_REPO }}/${{ vars.DOCKER_IMAGE_NAME }}:bleeding-edge .
          docker push ${{ vars.DOCKER_REPO_ADDR }}/${{ vars.DOCKER_REPO }}/${{ vars.DOCKER_IMAGE_NAME }}:bleeding-edge
