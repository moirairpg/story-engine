name: Create patch

on:
  workflow_dispatch:

jobs:
  create-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate branch
        run: |
          if [[ "${{ github.ref_name }}" != "main" ]]; then
            echo "::error::This workflow must be run on the main branch."
            exit 1
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Configure git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          APP_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Check no patch branch exists
        run: |
          if git ls-remote --heads origin 'patch/*' | grep -q .; then
            echo "::error::A patch branch already exists. Close it before creating a new one."
            exit 1
          fi

      - name: Resolve patch version
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_PATCH=$((PATCH + 1))
          PATCH_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "PATCH_VERSION=$PATCH_VERSION" >> $GITHUB_ENV

      - name: Create patch branch
        run: |
          git checkout -b patch/${{ env.PATCH_VERSION }}

      - name: Set patch version
        run: |
          mvn versions:set -DnewVersion=${{ env.PATCH_VERSION }}-PATCH-SNAPSHOT -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "create patch: set version ${{ env.PATCH_VERSION }}-PATCH-SNAPSHOT"
          git push origin patch/${{ env.PATCH_VERSION }}
