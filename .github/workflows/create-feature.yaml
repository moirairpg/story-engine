name: Create feature

on:
  workflow_dispatch:
    inputs:
      feature_name:
        description: "Feature name (e.g. my-feature)"
        required: true
        type: string

jobs:
  create-feature:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate branch
        run: |
          if [[ "${{ github.ref_name }}" != "develop" ]]; then
            echo "::error::This workflow must be run on the develop branch."
            exit 1
          fi

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout develop
        uses: actions/checkout@v6.0.2
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Configure git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          APP_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Create feature branch
        run: |
          git checkout -b feature/${{ inputs.feature_name }}

      - name: Set feature version
        run: |
          CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          NUMERIC_VERSION=${CURRENT_VERSION%-SNAPSHOT}
          FEATURE_VERSION="${NUMERIC_VERSION}-${{ inputs.feature_name }}-SNAPSHOT"
          mvn versions:set -DnewVersion=$FEATURE_VERSION -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "create feature: set version $FEATURE_VERSION"
          git push origin feature/${{ inputs.feature_name }}
