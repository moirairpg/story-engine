moirai:
  config:
    request-moderation: false
  nano-id:
    alphabet: 0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ
    characters-amount: 10
  adventure:
    message-window-size: 10
  rag:
    lorebook:
      top-k: 5
      collection-name: lorebook
      vector-size: 1536
    chronicle:
      top-k: 3
      collection-name: chronicle
      vector-size: 1536
  discord:
    oauth:
      client-id: dummy_value
      client-secret: dummy_value
      redirect-url: http://dummy_value
    api-base-url: https://discord.com/api
    api-token: dummy_value
  storage:
    endpoint: http://localhost:9000
    access-key: dummy
    secret-key: dummy
    bucket: dummy
    region: us-east-1
  security:
    allowed-origins: http://localhost
    allowed-headers: Content-Type
    redirect-path:
      success: http://localhost/success
      fail: http://localhost/fail
      logout: http://localhost/logout

spring:
  main.banner-mode: 'off'
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate.ddl-auto: none
